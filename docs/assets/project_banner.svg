<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Credit Default Risk Analysis</title>
  <desc id="desc">A project banner showing model and business metrics</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#172554"/>
      <stop offset="1" stop-color="#164e63"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <circle cx="1090" cy="35" r="180" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="90" cy="350" r="170" fill="#34d399" opacity="0.06"/>
  <rect x="64" y="62" width="8" height="102" rx="4" fill="url(#accent)"/>
  <text x="96" y="104" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="39" font-weight="700">Credit Default Risk Analysis</text>
  <text x="96" y="145" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="20">EDA · Risk Segmentation · Machine Learning · Business Evaluation</text>
  <g filter="url(#shadow)">
    <rect x="64" y="208" width="244" height="100" rx="14" fill="#ffffff" opacity="0.09" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="326" y="208" width="244" height="100" rx="14" fill="#ffffff" opacity="0.09" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="588" y="208" width="244" height="100" rx="14" fill="#ffffff" opacity="0.09" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="850" y="208" width="286" height="100" rx="14" fill="#ffffff" opacity="0.09" stroke="#ffffff" stroke-opacity="0.12"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="88" y="244" fill="#94a3b8" font-size="15" font-weight="600">DATASET</text>
    <text x="88" y="282" fill="#f8fafc" font-size="29" font-weight="700">30,000</text>
    <text x="350" y="244" fill="#94a3b8" font-size="15" font-weight="600">ROC-AUC</text>
    <text x="350" y="282" fill="#38bdf8" font-size="29" font-weight="700">0.776</text>
    <text x="612" y="244" fill="#94a3b8" font-size="15" font-weight="600">PR-AUC</text>
    <text x="612" y="282" fill="#34d399" font-size="29" font-weight="700">0.556</text>
    <text x="874" y="244" fill="#94a3b8" font-size="15" font-weight="600">TOP 20% RISK CAPTURE</text>
    <text x="874" y="282" fill="#fbbf24" font-size="29" font-weight="700">51.09%</text>
  </g>
</svg>

